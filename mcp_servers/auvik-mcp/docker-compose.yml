version: '3.8'

services:
  auvik-mcp:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AUVIK_USERNAME=${AUVIK_USERNAME}
      - AUVIK_API_KEY=${AUVIK_API_KEY}
      - AUVIK_REGION=${AUVIK_REGION:-us1}
      - MCP_TRANSPORT=http
      - NODE_ENV=development
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s