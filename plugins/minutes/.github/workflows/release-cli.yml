name: Release CLI Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: minutes
            asset: minutes-macos-arm64
            features: parakeet,metal
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: minutes.exe
            asset: minutes-windows-x64.exe
            features: parakeet
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: minutes
            asset: minutes-linux-x64
            features: parakeet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux audio dev headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libspa-0.2-dev

      - name: Set CXXFLAGS for whisper.cpp (macOS)
        if: runner.os == 'macOS'
        run: echo "CXXFLAGS=-I$(xcrun --show-sdk-path)/usr/include/c++/v1" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Clean stale Windows native build cache
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rm -rf \
            target/debug/build/whisper-rs-sys-* \
            target/release/build/whisper-rs-sys-* \
            target/debug/build/knf-rs-sys-* \
            target/release/build/knf-rs-sys-*

      - name: Build release binary
        run: cargo build --release -p minutes-cli --features ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset }}

  checksums:
    name: Publish CLI checksums
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f | sort | while IFS= read -r file; do
            sha="$(sha256sum "$file" | awk '{print $1}')"
            printf '%s  %s\n' "$sha" "$(basename "$file")"
          done > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksum release asset
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
