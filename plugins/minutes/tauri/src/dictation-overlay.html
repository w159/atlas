<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictation</title>
  <style>
    @font-face {
      font-family: 'Geist';
      font-style: normal;
      font-weight: 400;
      src: url('fonts/Geist-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist';
      font-style: normal;
      font-weight: 500;
      src: url('fonts/Geist-Medium.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist Mono';
      font-style: normal;
      font-weight: 400;
      src: url('fonts/GeistMono-Regular.woff2') format('woff2');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      color-scheme: light dark;
      --bg-hover:       #1C1C1A;
      --border:         rgba(255, 255, 255, 0.06);
      --border-mid:     #2A2924;
      --text:       #E8E4DA;
      --text-secondary: #6B6760;
      --text-tertiary:  #3D3B38;
      --accent:     #30D158;
      --red:        #FF453A;
      --green:      #30D158;
      --red-border-strong: rgba(255, 69, 58, 0.45);
      --red-ring: rgba(255, 69, 58, 0.16);
      --red-glow: rgba(255, 69, 58, 0.28);
      --red-outline: rgba(255, 69, 58, 0.14);
      --red-halo: rgba(255, 69, 58, 0.08);
      --green-ring: rgba(48, 209, 88, 0.18);
      --green-glow: rgba(48, 209, 88, 0.28);
      --accent-ring: rgba(48, 209, 88, 0.18);
      --accent-glow: rgba(48, 209, 88, 0.28);
      --spinner-track: rgba(48, 209, 88, 0.18);
      --waveform-top: rgba(255,255,255,0.85);
      --waveform-bottom: rgba(255,255,255,0.42);
      --shadow:
        0 14px 28px rgba(0, 0, 0, 0.35),
        0 4px 10px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-hover:       #E8E2D8;
        --border:         rgba(0, 0, 0, 0.07);
        --border-mid:     rgba(0, 0, 0, 0.13);
        --text:           #1A1916;
        --text-secondary: #8C8880;
        --text-tertiary:  #BDB9B0;
        --accent:         #C96B4E;
        --red:            #C0392B;
        --green:          #2E7D46;
        --red-border-strong: rgba(192, 57, 43, 0.32);
        --red-ring: rgba(192, 57, 43, 0.12);
        --red-glow: rgba(192, 57, 43, 0.18);
        --red-outline: rgba(192, 57, 43, 0.12);
        --red-halo: rgba(192, 57, 43, 0.06);
        --green-ring: rgba(46, 125, 70, 0.14);
        --green-glow: rgba(46, 125, 70, 0.20);
        --accent-ring: rgba(201, 107, 78, 0.14);
        --accent-glow: rgba(201, 107, 78, 0.20);
        --spinner-track: rgba(201, 107, 78, 0.14);
        --waveform-top: rgba(26, 25, 22, 0.70);
        --waveform-bottom: rgba(26, 25, 22, 0.28);
        --shadow:
          0 14px 28px rgba(0, 0, 0, 0.12),
          0 4px 10px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(0, 0, 0, 0.03);
      }
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: flex-end;
    }

    .pill {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 48px;
      background: var(--bg-hover);
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      box-shadow: var(--shadow);
      animation: appear 200ms ease-out;
      transition: height 200ms ease-out, border-color 220ms ease, box-shadow 220ms ease;
      overflow: hidden;
      position: relative;
    }

    .pill.expanded {
      height: 88px;
    }

    .pill.error {
      border-color: var(--red-border-strong);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.14),
        0 0 0 1px var(--red-outline),
        0 0 14px var(--red-halo);
    }

    .pill.dismissing {
      animation: dismiss 150ms ease-out forwards;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes dismiss {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(12px) scale(0.985); }
    }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      flex-shrink: 0;
      min-height: 46px;
    }

    /* Status dot */
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--red);
      box-shadow:
        0 0 0 4px var(--red-ring),
        0 0 16px var(--red-glow);
    }

    .dot.blink {
      animation: pulse 1.6s ease-in-out infinite;
    }

    .dot.green {
      background: var(--green);
      box-shadow:
        0 0 0 4px var(--green-ring),
        0 0 16px var(--green-glow);
    }
    .dot.accent {
      background: var(--accent);
      box-shadow:
        0 0 0 4px var(--accent-ring),
        0 0 16px var(--accent-glow);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.78); opacity: 0.48; }
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--spinner-track);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.0s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Label */
    .label {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 180ms ease, transform 180ms ease, filter 180ms ease;
    }

    /* Timer */
    .timer {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
      flex-shrink: 0;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .waveform .bar {
      width: 3px;
      background: linear-gradient(180deg, var(--waveform-top), var(--waveform-bottom));
      border-radius: 999px;
      transition: height 120ms ease, opacity 120ms ease;
      min-height: 5px;
      opacity: 0.75;
    }

    .soft-swap {
      opacity: 0.4;
      transform: translateY(2px);
      filter: blur(0.4px);
    }

    /* Text row */
    .text-row {
      padding: 0 14px 10px 14px;
      border-top: 1px solid var(--border);
      margin-top: -2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .text-row.visible {
      opacity: 1;
    }

    .text-content {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.35;
      max-height: 2.7em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      padding-top: 8px;
    }

    .text-content.placeholder {
      color: var(--text-tertiary);
    }

    /* Silence countdown bar */
    .silence-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent);
      opacity: 0.3;
      border-radius: 0 0 20px 20px;
      transform-origin: left center;
      transition: none;
    }

    .silence-bar.hidden {
      display: none;
    }

    /* Error icon */
    .error-icon {
      font-size: 16px;
      color: var(--red);
      flex-shrink: 0;
    }

    /* Success icon */
    .success-icon {
      font-size: 16px;
      color: var(--green);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="pill" id="pill" role="status" aria-live="polite">
    <div class="status-row" id="status-row">
      <div class="spinner" id="indicator"></div>
      <span class="label" id="label">Loading model...</span>
      <div class="waveform" id="waveform" style="display:none">
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:4px"></div>
      </div>
      <span class="timer" id="timer" style="display:none">0:00</span>
    </div>
    <div class="text-row" id="text-row">
      <div class="text-content placeholder" id="text-content">...</div>
    </div>
    <div class="silence-bar hidden" id="silence-bar"></div>
  </div>

  <script>
    const { listen } = window.__TAURI__.event;

    const pill = document.getElementById('pill');
    const indicator = document.getElementById('indicator');
    const label = document.getElementById('label');
    const waveform = document.getElementById('waveform');
    const timer = document.getElementById('timer');
    const textRow = document.getElementById('text-row');
    const textContent = document.getElementById('text-content');
    const silenceBar = document.getElementById('silence-bar');
    const bars = waveform.querySelectorAll('.bar');
    const cues = {
      start: new Audio('audio/cue-start.wav'),
      stop: new Audio('audio/cue-stop.wav'),
      complete: new Audio('audio/cue-complete.wav'),
      error: new Audio('audio/cue-error.wav'),
    };

    let startTime = null;
    let timerInterval = null;
    let lastState = null;
    let sessionStarted = false;
    let terminalCuePlayed = false;
    let partialText = '';
    let partialDebounce = null;
    let silenceTimeout = null;
    let silenceStartTime = null;

    Object.assign(cues.start, { volume: 0.18 });
    Object.assign(cues.stop, { volume: 0.16 });
    Object.assign(cues.complete, { volume: 0.18 });
    Object.assign(cues.error, { volume: 0.15 });

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        timer.textContent = formatTime(elapsed);
      }, 200);
    }

    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
    }

    function playCue(name) {
      const cue = cues[name];
      if (!cue) return;
      try {
        cue.currentTime = 0;
        cue.play().catch(() => {});
      } catch (_) {}
    }

    function soften(el) {
      if (!el) return;
      el.classList.add('soft-swap');
      requestAnimationFrame(() => {
        setTimeout(() => el.classList.remove('soft-swap'), 32);
      });
    }

    function showExpanded(show) {
      if (show) {
        pill.classList.add('expanded');
        textRow.classList.add('visible');
      } else {
        pill.classList.remove('expanded');
        textRow.classList.remove('visible');
      }
    }

    function setTextContent(text, isPlaceholder) {
      textContent.textContent = text;
      textContent.classList.toggle('placeholder', isPlaceholder);
    }

    function setIndicator(type) {
      // Remove any injected icons
      document.getElementById('spin')?.remove();
      document.getElementById('success-ic')?.remove();
      document.getElementById('error-ic')?.remove();

      const statusRow = document.getElementById('status-row');

      if (type === 'dot-blink') {
        indicator.className = 'dot blink';
        indicator.style.display = '';
      } else if (type === 'dot-solid') {
        indicator.className = 'dot';
        indicator.style.display = '';
      } else if (type === 'spinner') {
        indicator.className = 'spinner';
        indicator.style.display = '';
      } else if (type === 'success') {
        indicator.style.display = 'none';
        const ic = document.createElement('span');
        ic.className = 'success-icon';
        ic.id = 'success-ic';
        ic.textContent = '\u2713';
        statusRow.insertBefore(ic, label);
      } else if (type === 'error') {
        indicator.style.display = 'none';
        const ic = document.createElement('span');
        ic.className = 'error-icon';
        ic.id = 'error-ic';
        ic.textContent = '\u2715';
        statusRow.insertBefore(ic, label);
      } else {
        indicator.style.display = 'none';
      }
    }

    function hideSilenceBar() {
      silenceBar.classList.add('hidden');
      silenceBar.style.transition = 'none';
      silenceBar.style.transform = 'scaleX(1)';
      if (silenceTimeout) {
        clearTimeout(silenceTimeout);
        silenceTimeout = null;
      }
      silenceStartTime = null;
    }

    // Listen for state changes from Tauri backend
    listen('dictation:state', (e) => {
      const state = e.payload;

      if (state !== lastState) {
        if ((state === 'listening' || state === 'accumulating') && !sessionStarted) {
          playCue('start');
          sessionStarted = true;
          terminalCuePlayed = false;
        }
        if (state === 'success' && !terminalCuePlayed) {
          playCue('complete');
          terminalCuePlayed = true;
        }
        if ((state === 'typed' || state === 'pasted' || state === 'copied' || state === 'blocked') && !terminalCuePlayed) {
          playCue('complete');
          terminalCuePlayed = true;
        }
        if (state === 'error' && !terminalCuePlayed) {
          playCue('error');
          terminalCuePlayed = true;
        }
        lastState = state;
      }

      pill.classList.remove('error');
      stopTimer();
      hideSilenceBar();
      soften(label);

      switch (state) {
        case 'loading':
          setIndicator('spinner');
          label.textContent = 'Loading model\u2026';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(false);
          break;

        case 'listening':
          setIndicator('dot-blink');
          label.textContent = 'Listening\u2026';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(false);
          partialText = '';
          setTextContent('...', true);
          break;

        case 'accumulating':
          setIndicator('dot-solid');
          label.textContent = 'Dictating';
          waveform.style.display = 'flex';
          timer.style.display = '';
          // Stay compact during dictation — text appears only on success
          showExpanded(false);
          startTimer();
          break;

        case 'processing':
          // Seamless transition: keep "Dictating" label, swap dot for spinner
          setIndicator('spinner');
          waveform.style.display = 'none';
          // timer stays frozen (don't hide it)
          // Stay compact — will expand when success shows final text
          showExpanded(false);
          break;

        case 'partial':
          // Handled by dictation:partial listener — no state change needed here
          break;

        case 'inserting':
          setIndicator('spinner');
          label.textContent = 'Typing\u2026';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(true);
          break;

        case 'success':
        case 'copied':
          setIndicator('success');
          label.textContent = 'Copied';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(true);
          // Auto-dismiss after 2.5s. Click to dismiss early.
          setTimeout(() => dismiss(), 2500);
          break;

        case 'typed':
          setIndicator('success');
          label.textContent = 'Typed';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(true);
          setTimeout(() => dismiss(), 2500);
          break;

        case 'pasted':
          setIndicator('success');
          label.textContent = 'Pasted';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(true);
          setTimeout(() => dismiss(), 2500);
          break;

        case 'blocked':
          setIndicator('success');
          label.textContent = 'Copied instead';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(true);
          setTimeout(() => dismiss(), 3500);
          break;

        case 'error':
          pill.classList.add('error');
          setIndicator('error');
          label.textContent = 'Failed \u2014 audio saved';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          showExpanded(false);
          setTimeout(() => dismiss(), 4000);
          break;

        case 'cancelled':
        case 'yielded':
          dismiss();
          break;
      }
    });

    // Listen for partial text updates (streaming whisper)
    listen('dictation:partial', (e) => {
      const text = e.payload;
      if (!text) return;
      partialText = text;

      // Debounce DOM updates to 150ms to prevent flicker
      if (partialDebounce) return;
      partialDebounce = setTimeout(() => {
        partialDebounce = null;
        setTextContent(partialText, false);
      }, 150);
    });

    // Listen for final result text
    listen('dictation:result', (e) => {
      const text = e.payload;
      if (text) {
        setTextContent(text, false);
      }
    });

    // Listen for audio level updates (waveform animation)
    listen('dictation:level', (e) => {
      const level = e.payload; // 0-100
      const normalized = level / 100;
      bars.forEach((bar, i) => {
        const variance = Math.sin((i / bars.length) * Math.PI + Date.now() / 200) * 0.3 + 0.7;
        const h = 4 + normalized * 12 * variance;
        bar.style.height = `${Math.max(4, Math.min(16, h))}px`;
      });
    });

    // Listen for silence countdown (emitted by backend as ms remaining)
    listen('dictation:silence', (e) => {
      const { total_ms, remaining_ms } = e.payload;
      if (remaining_ms <= 0 || total_ms <= 0) {
        hideSilenceBar();
        return;
      }
      const fraction = remaining_ms / total_ms;
      silenceBar.classList.remove('hidden');
      silenceBar.style.transition = 'none';
      silenceBar.style.transform = `scaleX(${fraction})`;
      // Animate the remaining portion to zero
      requestAnimationFrame(() => {
        silenceBar.style.transition = `transform ${remaining_ms}ms linear`;
        silenceBar.style.transform = 'scaleX(0)';
      });
    });

    function dismiss() {
      pill.classList.add('dismissing');
      setTimeout(() => {
        window.__TAURI__.core.invoke('cmd_dismiss_dictation_overlay')
          .catch(() => window.__TAURI__.window.getCurrentWindow().close());
      }, 150);
    }

    // Click to dismiss early (during success state)
    pill.addEventListener('click', () => {
      if (lastState === 'success' || lastState === 'error') {
        dismiss();
      }
    });

    // Esc key cancels
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.__TAURI__.core.invoke('cmd_stop_dictation').catch(() => {});
        dismiss();
      }
    });
  </script>
</body>
</html>
